name: CI - PromptProtect

on:
  push:
    branches: [ "main", "stage" ]
  pull_request:
    branches: [ "main", "stage" ]

jobs:
  test-and-verify:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          PromptprotectBackend/package-lock.json
          promptprotectfrontend/package-lock.json

    # Backend Setup & Test
    - name: Install Backend Dependencies
      working-directory: ./PromptprotectBackend
      run: npm ci

    - name: Create Backend .env
      working-directory: ./PromptprotectBackend
      run: |
        cat << 'EOF' > .env
        ${{ secrets.BACKEND_ENV }}
        EOF
        echo "" >> .env
        # Override for the server's local environment
        echo "BASE_URL=http://localhost:5005" >> .env

    - name: Start Backend Server
      working-directory: ./PromptprotectBackend
      run: npm start &
      env:
        NODE_ENV: test

    - name: Wait for Backend
      run: |
        npx wait-on http://127.0.0.1:5005/health --timeout 60000

    - name: Run Backend Tests
      working-directory: ./PromptprotectBackend
      run: |
        echo "Contents of .env:"
        cat .env
        node scripts/test-flow.js

    # Frontend Setup & Test
    - name: Install Frontend Dependencies
      working-directory: ./promptprotectfrontend
      run: npm ci

    - name: Install Playwright Dependencies (Amazon Linux 2023)
      run: |
        sudo dnf install -y alsa-lib at-spi2-atk atk cups-libs dbus-libs expat libX11 libXcomposite libXcursor libXdamage libXext libXfixes libXi libXrandr libXrender libXScrnSaver libXtst pango mesa-libgbm nspr nss nss-util libxkbcommon libX11-xcb libxcb libdrm gtk3

    - name: Install Playwright Browsers
      working-directory: ./promptprotectfrontend
      run: npx playwright install chromium

    - name: Create Frontend .env
      working-directory: ./promptprotectfrontend
      run: |
        cat << 'EOF' > .env
        ${{ secrets.FRONTEND_ENV }}
        EOF

    - name: Run Frontend Tests
      working-directory: ./promptprotectfrontend
      run: npx playwright test
